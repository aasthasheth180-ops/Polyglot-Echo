<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="main-wrapper">
        <h1>Polyglot Echo</h1>
        <select id="langSelect">
            <option value="en">English (US)</option>
        </select>
        <select id="profileSelect">
            <option value="aastha">Aastha</option>
            <option value="guest">Guest</option>
        </select>

        <div id="chat-container"></div>

        <div class="input-area">
            <input type="text" id="textInput" placeholder="Type a message...">
            <button onclick="sendTextMessage()">Send</button>
            <button id="micBtn">🎤 Hold to Record</button>
        </div>

        <div id="guestSetup" style="display:none;">
            <button onclick="recordGuestVoice()" id="guestRecordBtn">🎙️ Record 10s voice reference</button>
            <span id="guestStatus">Not recorded yet</span>
        </div>
    </div>

    <script>
        const BACKEND = "https://polyglot-echo-production.up.railway.app";
        let audioQueue = [];
        let isPlaying = false;
        let audioCtx = null;

        async function playNextChunk() {
            if (isPlaying || audioQueue.length === 0) return;
            isPlaying = true;
            const chunk = audioQueue.shift();
            if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 24000 });
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const decoded = await audioCtx.decodeAudioData(chunk);
            const source = audioCtx.createBufferSource();
            source.buffer = decoded;
            source.connect(audioCtx.destination);
            source.onended = () => { isPlaying = false; setTimeout(playNextChunk, 0); };
            source.start(0);
        }

        async function sendTextMessage() {
            const text = document.getElementById('textInput').value;
            const resp = await fetch(`${BACKEND}/api/process-text`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, target_lang: 'en' })
            });
            const audioBlob = await resp.blob();
            audioQueue.push(await audioBlob.arrayBuffer());
            playNextChunk();
        }
    </script>
</body>

</html>
