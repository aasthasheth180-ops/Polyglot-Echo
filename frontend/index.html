<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polyglot Echo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <header>
            <h1>Polyglot Echo</h1>
            <p>Real-time Multilingual Conversational Streaming Platform</p>
        </header>

        <section class="controls-panel">
            <div class="control-group">
                <label>TARGET LANGUAGE</label>
                <select id="langSelect">
                    <option value="en">English (US)</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    </select>
            </div>
            <div class="control-group">
                <label>SPEAKER PROFILE (VOICE)</label>
                <select id="profileSelect">
                    <option value="aastha">Aastha Clone (Tuned)</option>
                    <option value="guest">Guest Voice (Record New)</option>
                </select>
            </div>
        </section>

        <div id="chat-container">
            </div>

        <section class="input-area">
            <button id="recordBtn">🎤 Hold to Record</button>
            <input type="text" id="textInput" placeholder="Type a message or hold mic to speak...">
            <button id="sendBtn" onclick="sendTextMessage()">Send</button>
        </section>
    </div>
</body>
</html>
